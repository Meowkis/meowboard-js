services:
  meowboard:
    build: .
    container_name: meowboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3144
      OWNER_NICKNAME: "${OWNER_NICKNAME:-YourNickname}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:?Set ADMIN_PASSWORD_HASH in .env}"
    volumes:
      - ./data:/app/data
      - ./public/media:/app/public/media
    networks:
      - meowboard_internal
    expose:
      - "3144"

  meowboard-anubis:
    image: ghcr.io/techarohq/anubis:latest
    container_name: meowboard-anubis
    restart: unless-stopped
    pull_policy: always
    environment:
      BIND: ":3000"
      TARGET: "http://meowboard:3144"
      DIFFICULTY: "4"
      SERVE_ROBOTS_TXT: "true"
      OG_PASSTHROUGH: "true"
      OG_EXPIRY_TIME: "24h"
    networks:
      - caddy_net
      - meowboard_internal
    depends_on:
      - meowboard
    healthcheck:
      test: ["CMD", "anubis", "--healthcheck"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 500ms

networks:
  caddy_net:
    external: true

  meowboard_internal:
    internal: true
